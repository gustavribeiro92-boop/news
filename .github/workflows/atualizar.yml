name: Atualizar Super Feed

on:
  schedule:
    - cron: '0 */2 * * *' # Roda a cada 2 horas
  workflow_dispatch: # Permite rodar clicando no botão

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v3

      - name: Instalar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar os programas necessários
        run: pip install feedparser feedgen pytz requests tweepy

      - name: Rodar o nosso script principal
        run: python gerador_rss.py

      - name: Executar Bot do Twitter
        # 🔑 Aqui corrigimos o comando 'run' para chamar o arquivo do bot!
        env:
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python bot_twitter.py

      - name: Salvar os arquivos atualizados
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Atualizando o Hub de Noticias" || exit 0
          git push
