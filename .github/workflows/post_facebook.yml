name: Publicar Destaque no Facebook

on:
  schedule:
    # 11h, 15h e 21h no fuso UTC (equivale a 08h, 12h e 18h em Brasília)
    - cron: '0 11,15,21 * * *' 
  workflow_dispatch: 

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v3

      - name: Instalar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar Bibliotecas
        run: pip install requests Pillow

      - name: Executar Bot do Facebook
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: python bot_facebook.py

      - name: Salvar Memória do Robô (Anti-Repetição)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add historico_postados.txt
          # Só faz o commit se houver alguma mudança (se uma nova notícia foi postada)
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Memória: Atualizando histórico de posts" && git push)
